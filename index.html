<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>灵驭智驱—四轮独立驱动/转向控制效果演示</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body {
      background: linear-gradient(135deg, #f1f5f9, #f8fafc 48%, #ecfeff);
      color: #0f172a;
      overflow-x: hidden;
    }
    .page {
      min-height: 100dvh;
      padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
    }
    .phone {
      width: min(100%, 430px);
      margin: 0 auto;
    }
    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 12px;
      line-height: 1.2;
    }
    .demo-shell {
      width: 100%;
      aspect-ratio: 9 / 19.5;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .scene-wrap {
      position: relative;
      height: 61%;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      background: #020617;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
    }
    #scene {
      display: block;
      width: 100%;
      height: 100%;
    }
    .hud-left,
    .hud-right {
      position: absolute;
      top: 14px;
      z-index: 30;
      color: white;
      text-shadow: 0 0 14px rgba(103, 232, 249, 0.55);
      pointer-events: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .hud-left { left: 14px; width: 180px; }
    .hud-right { right: 14px; width: 150px; text-align: right; }
    .hud-title {
      margin-bottom: 6px;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(207, 250, 254, 0.7);
      text-transform: uppercase;
    }
    .hud-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 12px;
      row-gap: 4px;
      font-size: 10px;
      line-height: 1.15;
      color: rgba(240, 253, 250, 0.92);
    }
    .hud-grid span,
    .hud-right span { color: rgba(207, 250, 254, 0.52); }
    .hud-right .line {
      font-size: 11px;
      line-height: 1.25;
      margin-top: 4px;
      color: rgba(240, 253, 250, 0.92);
    }
    .mode-card {
      position: absolute;
      left: 50%;
      bottom: 64px;
      transform: translateX(-50%);
      z-index: 30;
      min-width: 320px;
      padding: 14px 24px;
      text-align: center;
      border-radius: 16px;
      box-shadow: 0 0 32px rgba(56, 189, 248, 0.16);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    .mode-card .mode-text {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }
    .panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.9);
      padding: 12px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(8px);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .panel-title { font-size: 16px; font-weight: 800; line-height: 1.1; }
    .panel-sub { margin-top: 3px; font-size: 12px; color: #64748b; }
    .tools { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .scale-slider { width: 136px; accent-color: #06b6d4; cursor: pointer; }
    .reset-btn {
      border: 0;
      background: #0f172a;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.16);
    }
    .control-list { display: grid; gap: 8px; }
    .control-card {
      border: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.86);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
    }
    .control-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .control-label { font-size: 14px; font-weight: 800; color: #1e293b; }
    .value-row { display: flex; align-items: center; gap: 6px; }
    .case-btn {
      border: 0;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      color: #0e7490;
      background: #ecfeff;
      cursor: pointer;
      transition: 0.15s ease;
    }
    .case-btn.active { color: white; background: #06b6d4; box-shadow: 0 2px 8px rgba(6, 182, 212, 0.35); }
    .value-pill {
      border-radius: 999px;
      background: #0f172a;
      color: white;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .segment-box {
      overflow: hidden;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 16px;
      margin-bottom: 8px;
    }
    .segment-stage,
    .segment-labels { display: grid; grid-template-columns: repeat(5, 1fr); }
    .segment-stage {
      border-bottom: 1px solid #e2e8f0;
      font-size: 9px;
      color: #94a3b8;
      text-align: center;
    }
    .segment-stage div { padding: 2px 0; }
    .seg-item {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      text-align: center;
      font-size: 9px;
      font-weight: 800;
      line-height: 1.15;
      color: #64748b;
      background: #f8fafc;
      transition: 0.15s ease;
    }
    .seg-item.center { background: white; color: #334155; }
    .seg-item.active { background: #0f172a; color: white; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
    input[type="range"] { width: 100%; accent-color: #06b6d4; cursor: pointer; }
    .slider-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 11px;
      color: #64748b;
    }
    .slider-bottom .sub { text-align: center; flex: 1; }
    @media (max-width: 390px) {
      .page { padding-left: 8px; padding-right: 8px; }
      .title { font-size: 18px; }
      .scale-slider { width: 110px; }
      .mode-card { min-width: 286px; padding: 12px 16px; }
      .mode-card .mode-text { font-size: 16px; }
      .hud-left { width: 166px; left: 10px; }
      .hud-right { width: 138px; right: 10px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="phone">
      <h1 class="title">灵驭智驱—四轮独立驱动/转向控制效果演示</h1>
      <div class="demo-shell">
        <div class="scene-wrap">
          <svg id="scene" viewBox="0 0 760 1000" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="hud-left">
            <div id="assistGrid" class="hud-grid"></div>
          </div>
          <div class="hud-right">
            <div class="hud-title">动态信息</div>
            <div id="dynamicInfo"></div>
          </div>
          <div id="modeCard" class="mode-card">
            <div id="modeText" class="mode-text"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">协同转向主控制</div>
              <div class="panel-sub">四轮独立转向与转矩分配已集成</div>
            </div>
            <div class="tools">
              <input id="scaleSlider" class="scale-slider" type="range" min="0.6" max="2.2" step="0.1" value="1.6" aria-label="View Scale" />
              <button id="resetBtn" class="reset-btn" type="button">重置</button>
            </div>
          </div>

          <div class="control-list">
            <div class="control-card">
              <div class="control-top">
                <div class="control-label">行驶车速</div>
                <div id="speedValue" class="value-pill">3.3 km/h</div>
              </div>
              <input id="speedSlider" type="range" min="0" max="60" step="0.1" value="3.3" />
              <div class="slider-bottom"><span>0.0</span><span class="sub">速度越高，可用转角范围自动收缩</span><span>60.0</span></div>
            </div>

            <div class="control-card">
              <div class="control-top">
                <div class="control-label">协同转向输入</div>
                <div class="value-row">
                  <button id="caseBtn" class="case-btn" type="button">变道案例</button>
                  <div id="steerValue" class="value-pill">0.0°</div>
                </div>
              </div>

              <div class="segment-box">
                <div class="segment-stage"><div>Stage 3</div><div>Stage 2</div><div>Stage 1</div><div>Stage 2</div><div>Stage 3</div></div>
                <div class="segment-labels" id="segmentLabels"></div>
              </div>

              <input id="steerSlider" type="range" min="-28" max="28" step="0.1" value="0" />
              <div class="slider-bottom"><span id="steerLeft">28.0</span><span id="steerSub" class="sub">当前输入幅值 0%</span><span id="steerRight">-28.0</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const VEHICLE = {
      wheelBase: 2.8,
      track: 1.56,
      bodyLength: 4.65,
      bodyWidth: 1.92,
      wheelLength: 0.72,
      wheelWidth: 0.28,
      mass: 1550,
      maxSteerDeg: 32,
      maxGlobalDeg: 28,
      predTime: 2.5,
    };

    const WHEELS = [
      { key: "fl", short: "FL", x: VEHICLE.wheelBase / 2, y: VEHICLE.track / 2 },
      { key: "fr", short: "FR", x: VEHICLE.wheelBase / 2, y: -VEHICLE.track / 2 },
      { key: "rl", short: "RL", x: -VEHICLE.wheelBase / 2, y: VEHICLE.track / 2 },
      { key: "rr", short: "RR", x: -VEHICLE.wheelBase / 2, y: -VEHICLE.track / 2 },
    ];

    const INITIAL_SPEED_KMH = 3.3;
    const INITIAL_HEADING_RAD = Math.PI / 2;
    const INITIAL_VIEW_SCALE = 1.6;
    const BASE_TORQUE = 0.6;
    const CASE_BUTTON_ID = "rightLaneChange";
    const WIDTH = 760;
    const HEIGHT = 1000;

    const scene = document.getElementById("scene");
    const speedSlider = document.getElementById("speedSlider");
    const steerSlider = document.getElementById("steerSlider");
    const scaleSlider = document.getElementById("scaleSlider");
    const speedValue = document.getElementById("speedValue");
    const steerValue = document.getElementById("steerValue");
    const steerLeft = document.getElementById("steerLeft");
    const steerRight = document.getElementById("steerRight");
    const steerSub = document.getElementById("steerSub");
    const modeCard = document.getElementById("modeCard");
    const modeText = document.getElementById("modeText");
    const assistGrid = document.getElementById("assistGrid");
    const dynamicInfo = document.getElementById("dynamicInfo");
    const resetBtn = document.getElementById("resetBtn");
    const caseBtn = document.getElementById("caseBtn");
    const segmentLabels = document.getElementById("segmentLabels");

    const segments = ["左转矩/转向协同", "左转向协同", "纯阿克曼", "右转向协同", "右转矩/转向协同"];
    segmentLabels.innerHTML = segments.map((s, i) => `<div class="seg-item ${i === 2 ? "center" : ""}" data-index="${i}">${s}</div>`).join("");
    const segmentItems = Array.from(segmentLabels.querySelectorAll(".seg-item"));

    const app = {
      speedKmh: INITIAL_SPEED_KMH,
      globalSteer: 0,
      viewScale: INITIAL_VIEW_SCALE,
      activeCase: null,
      state: { x: 0, y: 0, psi: INITIAL_HEADING_RAD, v: INITIAL_SPEED_KMH / 3.6, r: 0 },
      controls: { speedKmh: INITIAL_SPEED_KMH, angles: ackermannAnglesFromGlobal(0), torques: { fl: BASE_TORQUE, fr: BASE_TORQUE, rl: BASE_TORQUE, rr: BASE_TORQUE } },
      trail: [{ x: 0, y: 0 }],
      lastFrame: null,
      caseStartTime: null,
      tick: 0,
    };

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function deg2rad(d) { return (d * Math.PI) / 180; }
    function rad2deg(r) { return (r * 180) / Math.PI; }
    function round1(v) { return Math.round(v * 10) / 10; }
    function smoothstep(x) { const t = clamp(x, 0, 1); return t * t * (3 - 2 * t); }
    function mix(a, b, t) { return a + (b - a) * smoothstep(t); }
    function laneChangeSmooth(u) { const t = clamp(u, 0, 1); return t * t * t * (10 - 15 * t + 6 * t * t); }

    function getCaseCommand(caseId, elapsedSec) {
      const t = clamp(elapsedSec, 0, 10);
      if (caseId !== CASE_BUTTON_ID) return { speedKmh: INITIAL_SPEED_KMH, ratio: 0 };
      let ratio = 0;
      let speedKmh = INITIAL_SPEED_KMH;
      if (t < 1.6) { ratio = mix(0, -0.28, t / 1.6); speedKmh = mix(3.3, 4.1, t / 1.6); }
      else if (t < 3.4) { ratio = mix(-0.28, -0.60, (t - 1.6) / 1.8); speedKmh = mix(4.1, 5.3, (t - 1.6) / 1.8); }
      else if (t < 4.9) { ratio = mix(-0.60, -0.95, (t - 3.4) / 1.5); speedKmh = mix(5.3, 6.0, (t - 3.4) / 1.5); }
      else if (t < 6.3) { ratio = mix(-0.95, 0.42, (t - 4.9) / 1.4); speedKmh = mix(6.0, 5.4, (t - 4.9) / 1.4); }
      else if (t < 7.8) { ratio = mix(0.42, 0.18, (t - 6.3) / 1.5); speedKmh = mix(5.4, 4.6, (t - 6.3) / 1.5); }
      else if (t < 9.0) { ratio = mix(0.18, -0.08, (t - 7.8) / 1.2); speedKmh = mix(4.6, 4.0, (t - 7.8) / 1.2); }
      else { ratio = mix(-0.08, 0, (t - 9.0) / 1.0); speedKmh = mix(4.0, 3.5, (t - 9.0) / 1.0); }
      return { speedKmh: round1(speedKmh), ratio };
    }

    function getLaneChangeSpeed(t) {
      const s = clamp(t, 0, 10);
      if (s < 1.6) return mix(3.3 / 3.6, 4.1 / 3.6, s / 1.6);
      if (s < 3.4) return mix(4.1 / 3.6, 5.3 / 3.6, (s - 1.6) / 1.8);
      if (s < 4.9) return mix(5.3 / 3.6, 6.0 / 3.6, (s - 3.4) / 1.5);
      if (s < 6.3) return mix(6.0 / 3.6, 5.4 / 3.6, (s - 4.9) / 1.4);
      if (s < 7.8) return mix(5.4 / 3.6, 4.6 / 3.6, (s - 6.3) / 1.5);
      if (s < 9.0) return mix(4.6 / 3.6, 4.0 / 3.6, (s - 7.8) / 1.2);
      return mix(4.0 / 3.6, 3.5 / 3.6, (s - 9.0) / 1.0);
    }

    function lateralOffsetAt(t) {
      const s = clamp(t, 0, 10);
      const finalShift = 4.7;
      const overshootShift = 5.55;
      if (s < 4.9) return overshootShift * laneChangeSmooth(s / 4.9);
      if (s < 6.8) return mix(overshootShift, finalShift * 0.94, (s - 4.9) / 1.9);
      if (s < 8.8) return mix(finalShift * 0.94, finalShift, (s - 6.8) / 2.0);
      return finalShift;
    }

    function lateralVelocityAt(t) { const eps = 0.02; return (lateralOffsetAt(t + eps) - lateralOffsetAt(t - eps)) / (2 * eps); }

    function forwardDistanceAt(t) {
      const s = clamp(t, 0, 10);
      const dt = 0.02;
      let y = 0;
      for (let tau = 0; tau < s; tau += dt) {
        const nextTau = Math.min(tau + dt, s);
        const vmid = getLaneChangeSpeed((tau + nextTau) / 2);
        y += vmid * (nextTau - tau);
      }
      return y;
    }

    function laneChangePsiAt(t) {
      const vy = getLaneChangeSpeed(t);
      const vx = lateralVelocityAt(t);
      return Math.atan2(vy, vx);
    }

    function getLaneChangeState(elapsedSec) {
      const t = clamp(elapsedSec, 0, 10);
      const x = lateralOffsetAt(t);
      const y = forwardDistanceAt(t);
      const v = getLaneChangeSpeed(t);
      const psi = laneChangePsiAt(t);
      const eps = 0.03;
      const r = (laneChangePsiAt(t + eps) - laneChangePsiAt(t - eps)) / (2 * eps);
      return { x, y, psi, v, r };
    }

    function angleDiffDeg(a, b) {
      let d = a - b;
      while (d > 180) d -= 360;
      while (d < -180) d += 360;
      return d;
    }

    function ackermannAnglesFromKappa(kappa) {
      const out = {};
      for (const w of WHEELS) {
        const delta = Math.atan2(kappa * w.x, 1 - kappa * w.y);
        out[w.key] = round1(rad2deg(delta));
      }
      return out;
    }

    function ackermannAnglesFromGlobal(globalDeg) {
      const kappa = Math.tan(deg2rad(globalDeg)) / VEHICLE.wheelBase;
      return ackermannAnglesFromKappa(kappa);
    }

    function estimateKappaFromAngles(angles) {
      const df = deg2rad((angles.fl + angles.fr) / 2);
      const dr = deg2rad((angles.rl + angles.rr) / 2);
      return (Math.tan(df) - Math.tan(dr)) / VEHICLE.wheelBase;
    }

    function estimateGlobalFromAngles(angles) {
      const kappa = estimateKappaFromAngles(angles);
      return round1(clamp(rad2deg(Math.atan(kappa * VEHICLE.wheelBase)), -VEHICLE.maxGlobalDeg, VEHICLE.maxGlobalDeg));
    }

    function evaluateSteeringSafety(angles, speedKmh) {
      const v = speedKmh / 3.6;
      const maxAbs = Math.max(...WHEELS.map((w) => Math.abs(angles[w.key])));
      const kappa = estimateKappaFromAngles(angles);
      const ay = v * v * Math.abs(kappa);
      const ayLimit = 0.72 * 9.81;
      const ideal = ackermannAnglesFromKappa(kappa);
      const slipErr = Math.max(...WHEELS.map((w) => Math.abs(angleDiffDeg(angles[w.key], ideal[w.key]))));
      const slipLimit = Math.max(3.2, 8.5 - 0.045 * speedKmh);
      const axleDiff = Math.max(Math.abs(angles.fl - angles.fr), Math.abs(angles.rl - angles.rr));
      const axleDiffLimit = Math.max(7.0, 14.0 - speedKmh / 22);
      const safe = maxAbs <= VEHICLE.maxSteerDeg + 1e-6 && ay <= ayLimit + 1e-6 && slipErr <= slipLimit + 1e-6 && axleDiff <= axleDiffLimit + 1e-6;
      return { safe, kappa, ay, ayLimit, slipErr, slipLimit, axleDiff, axleDiffLimit, maxAbs };
    }

    function intervalForGlobal(speedKmh) {
      const vals = [];
      for (let d = -VEHICLE.maxGlobalDeg; d <= VEHICLE.maxGlobalDeg + 1e-9; d += 0.1) {
        const val = round1(d);
        if (evaluateSteeringSafety(ackermannAnglesFromGlobal(val), speedKmh).safe) vals.push(val);
      }
      if (vals.length === 0) return { min: 0, max: 0 };
      return { min: vals[0], max: vals[vals.length - 1] };
    }

    function enforceSafeAngles(angles, speedKmh) {
      if (evaluateSteeringSafety(angles, speedKmh).safe) return angles;
      let low = 0;
      let high = 1;
      for (let i = 0; i < 30; i += 1) {
        const mid = (low + high) / 2;
        const candidate = Object.fromEntries(WHEELS.map((w) => [w.key, angles[w.key] * mid]));
        if (evaluateSteeringSafety(candidate, speedKmh).safe) low = mid;
        else high = mid;
      }
      return Object.fromEntries(WHEELS.map((w) => [w.key, round1(angles[w.key] * low)]));
    }

    function computeTorqueYawMoment(torques, angles) {
      let mz = 0;
      const forceScale = 1700;
      for (const w of WHEELS) {
        const force = forceScale * torques[w.key];
        const a = deg2rad(angles[w.key]);
        const fx = force * Math.cos(a);
        const fy = force * Math.sin(a);
        mz += w.x * fy - w.y * fx;
      }
      return mz;
    }

    function getStageTheme(stage) {
      if (stage === 1) return { color: "#34d399", softBg: "rgba(52,211,153,0.16)", border: "rgba(52,211,153,0.55)", text: "#d1fae5", title: "纯阿克曼转向", markerId: "url(#arrowStage1)", arrowScale: 0.78, lineWidthScale: 0.95 };
      if (stage === 2) return { color: "#38bdf8", softBg: "rgba(56,189,248,0.16)", border: "rgba(56,189,248,0.55)", text: "#e0f2fe", title: "阿克曼 + 独立转向协助", markerId: "url(#arrowStage2)", arrowScale: 1.0, lineWidthScale: 1.0 };
      return { color: "#c084fc", softBg: "rgba(192,132,252,0.18)", border: "rgba(192,132,252,0.58)", text: "#f5e8ff", title: "阿克曼 + 独立转向 + 独立转矩分配", markerId: "url(#arrowStage3)", arrowScale: 1.22, lineWidthScale: 1.12 };
    }

    function synthesizeCoordinatedControls(globalSteerDeg, speedKmh, steerRangeMaxAbs) {
      const sign = globalSteerDeg === 0 ? 0 : Math.sign(globalSteerDeg);
      const ratio = clamp(Math.abs(globalSteerDeg) / Math.max(0.1, steerRangeMaxAbs), 0, 1);
      const baseAngles = ackermannAnglesFromGlobal(globalSteerDeg);
      const stage1End = 1 / 3;
      const stage2End = 2 / 3;
      let stage = 1;
      if (ratio > stage2End) stage = 3;
      else if (ratio > stage1End) stage = 2;
      const speedAttenuation = 1 - 0.25 * clamp((speedKmh - 40) / 80, 0, 1);
      let steerAssist = 0;
      let torqueAssist = 0;
      let angles = { ...baseAngles };
      let torques = { fl: BASE_TORQUE, fr: BASE_TORQUE, rl: BASE_TORQUE, rr: BASE_TORQUE };
      if (stage >= 2) {
        const stage2Ratio = stage === 2 ? (ratio - stage1End) / (stage2End - stage1End) : 1;
        steerAssist = 4.5 * stage2Ratio * speedAttenuation;
        angles = {
          fl: round1(baseAngles.fl + sign * steerAssist * 1.0),
          fr: round1(baseAngles.fr + sign * steerAssist * 0.85),
          rl: round1(baseAngles.rl - sign * steerAssist * 0.6),
          rr: round1(baseAngles.rr - sign * steerAssist * 0.45),
        };
      }
      if (stage === 3) {
        const stage3Ratio = (ratio - stage2End) / (1 - stage2End);
        torqueAssist = 0.95 * stage3Ratio * sign;
        torques = {
          fl: round1(clamp(BASE_TORQUE - 0.55 * torqueAssist, -1, 1)),
          fr: round1(clamp(BASE_TORQUE + 0.55 * torqueAssist, -1, 1)),
          rl: round1(clamp(BASE_TORQUE - 0.45 * torqueAssist, -1, 1)),
          rr: round1(clamp(BASE_TORQUE + 0.45 * torqueAssist, -1, 1)),
        };
      }
      angles = enforceSafeAngles(angles, speedKmh);
      return { stage, ratio, baseAngles, angles, torques, steerAssist: round1(steerAssist), torqueAssist: round1(torqueAssist) };
    }

    function stepVehicle(state, controls, dt) {
      const speedTarget = controls.speedKmh / 3.6;
      const torques = controls.torques;
      const avgTorque = (torques.fl + torques.fr + torques.rl + torques.rr) / 4;
      const vTarget = clamp(speedTarget + 0.85 * avgTorque, 0, 38);
      const v = clamp(state.v + (vTarget - state.v) * Math.min(1, dt * 1.6), 0, 40);
      const kappa = estimateKappaFromAngles(controls.angles);
      const mz = computeTorqueYawMoment(torques, controls.angles);
      const rSteer = v * kappa;
      const rTorque = (0.82 * mz) / (VEHICLE.mass * Math.max(v, 2.2) * VEHICLE.wheelBase);
      const rTarget = clamp(rSteer + rTorque, -1.15, 1.15);
      const r = state.r + (rTarget - state.r) * Math.min(1, dt * 3.1);
      return { x: state.x + v * Math.cos(state.psi) * dt, y: state.y + v * Math.sin(state.psi) * dt, psi: state.psi + r * dt, v, r };
    }

    function buildPrediction(state, controls) {
      let s = { ...state };
      const pts = [];
      const dt = 0.05;
      for (let t = 0; t <= VEHICLE.predTime + 1e-9; t += dt) {
        pts.push({ x: s.x + Math.cos(s.psi) * (VEHICLE.bodyLength / 2), y: s.y + Math.sin(s.psi) * (VEHICLE.bodyLength / 2) });
        s = stepVehicle(s, controls, dt);
      }
      return pts;
    }

    function pathFromPoints(points) {
      if (!points || points.length < 2) return "";
      return points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    }

    function reset() {
      app.speedKmh = INITIAL_SPEED_KMH;
      app.globalSteer = 0;
      app.viewScale = INITIAL_VIEW_SCALE;
      app.activeCase = null;
      app.caseStartTime = null;
      app.state = { x: 0, y: 0, psi: INITIAL_HEADING_RAD, v: INITIAL_SPEED_KMH / 3.6, r: 0 };
      app.trail = [{ x: 0, y: 0 }];
      speedSlider.value = String(app.speedKmh);
      scaleSlider.value = String(app.viewScale);
    }

    function startLaneChangeCase() {
      reset();
      app.activeCase = CASE_BUTTON_ID;
      app.caseStartTime = performance.now();
      app.state = { x: 0, y: 0, psi: INITIAL_HEADING_RAD, v: INITIAL_SPEED_KMH / 3.6, r: 0 };
      app.trail = [{ x: 0, y: 0 }];
      caseBtn.classList.add("active");
    }

    function updateControlsFromInputs() {
      app.viewScale = round1(parseFloat(scaleSlider.value));
      app.speedKmh = round1(parseFloat(speedSlider.value));
      const range = intervalForGlobal(app.speedKmh);
      const raw = -parseFloat(steerSlider.value);
      app.globalSteer = round1(clamp(raw, range.min, range.max));
    }

    speedSlider.addEventListener("input", () => { app.activeCase = null; app.caseStartTime = null; caseBtn.classList.remove("active"); updateControlsFromInputs(); });
    steerSlider.addEventListener("input", () => { app.activeCase = null; app.caseStartTime = null; caseBtn.classList.remove("active"); updateControlsFromInputs(); });
    scaleSlider.addEventListener("input", updateControlsFromInputs);
    resetBtn.addEventListener("click", () => { reset(); caseBtn.classList.remove("active"); });
    caseBtn.addEventListener("click", startLaneChangeCase);

    function render(time) {
      if (app.lastFrame === null) app.lastFrame = time;
      const rawDt = (time - app.lastFrame) / 1000;
      app.lastFrame = time;
      const dt = clamp(rawDt, 0, 0.04);

      if (app.activeCase && app.caseStartTime) {
        const elapsed = (time - app.caseStartTime) / 1000;
        const command = getCaseCommand(app.activeCase, elapsed);
        app.speedKmh = round1(clamp(command.speedKmh, 0, 60));
        const range = intervalForGlobal(app.speedKmh);
        const maxAbs = Math.max(Math.abs(range.min), Math.abs(range.max), 0.1);
        app.globalSteer = round1(clamp(command.ratio * maxAbs, range.min, range.max));
        app.state = getLaneChangeState(elapsed);
        speedSlider.value = String(app.speedKmh);
        if (elapsed >= 10) {
          app.activeCase = null;
          app.caseStartTime = null;
          app.globalSteer = 0;
          caseBtn.classList.remove("active");
        }
      } else {
        updateControlsFromInputs();
      }

      const range = intervalForGlobal(app.speedKmh);
      const steerRangeMaxAbs = Math.max(Math.abs(range.min), Math.abs(range.max), 0.1);
      const coordinated = synthesizeCoordinatedControls(app.globalSteer, app.speedKmh, steerRangeMaxAbs);
      app.controls = { speedKmh: app.speedKmh, angles: coordinated.angles, torques: coordinated.torques };

      if (!(app.activeCase && app.caseStartTime)) app.state = stepVehicle(app.state, app.controls, dt);

      const last = app.trail[app.trail.length - 1];
      const dx = app.state.x - last.x;
      const dy = app.state.y - last.y;
      if (Math.hypot(dx, dy) > 0.22) {
        app.trail.push({ x: app.state.x, y: app.state.y });
        if (app.trail.length > 420) app.trail.shift();
      }

      drawScene(coordinated, range);
      updatePanel(coordinated, range);
      app.tick += 1;
      requestAnimationFrame(render);
    }

    function drawScene(coordinated, range) {
      const renderState = app.state;
      const angles = coordinated.angles;
      const torques = coordinated.torques;
      const stageTheme = getStageTheme(coordinated.stage);
      const yawMoment = computeTorqueYawMoment(torques, angles);
      const equivalentSteer = estimateGlobalFromAngles(angles);
      const scale = 40 * app.viewScale;
      const visualScale = clamp(app.viewScale, 0.6, 2.2);
      const anchorX = WIDTH * 0.5;
      const anchorY = HEIGHT * 0.56;
      const cam = { x: renderState.x, y: renderState.y };

      const worldToScreen = (x, y) => ({ x: anchorX + (x - cam.x) * scale, y: anchorY - (y - cam.y) * scale });
      const localToScreen = (lx, ly) => {
        const c = Math.cos(renderState.psi);
        const s = Math.sin(renderState.psi);
        const wx = renderState.x + lx * c - ly * s;
        const wy = renderState.y + lx * s + ly * c;
        return worldToScreen(wx, wy);
      };
      const polyPath = (pts) => pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ") + " Z";

      const grid = [];
      const minX = cam.x - anchorX / scale - 2;
      const maxX = cam.x + (WIDTH - anchorX) / scale + 2;
      const minY = cam.y - (HEIGHT - anchorY) / scale - 2;
      const maxY = cam.y + anchorY / scale + 2;
      for (let x = Math.floor(minX); x <= Math.ceil(maxX); x += 1) grid.push({ a: worldToScreen(x, minY), b: worldToScreen(x, maxY), major: x % 5 === 0 });
      for (let y = Math.floor(minY); y <= Math.ceil(maxY); y += 1) grid.push({ a: worldToScreen(minX, y), b: worldToScreen(maxX, y), major: y % 5 === 0 });

      const prediction = buildPrediction(renderState, app.controls);
      const predScreen = prediction.map((p) => worldToScreen(p.x, p.y));
      const predD = pathFromPoints(predScreen);
      const trailD = pathFromPoints(app.trail.map((p) => worldToScreen(p.x, p.y)));
      const endPred = predScreen[predScreen.length - 1] || { x: 0, y: 0 };
      const predLabelX = clamp(endPred.x + 10, 10, WIDTH - 136);
      const predLabelY = clamp(endPred.y - 18, 10, HEIGHT - 38);
      const centerDashOffset = -((app.tick * 0.9) % 48);

      const bodyPts = [
        localToScreen(VEHICLE.bodyLength / 2, 0),
        localToScreen(VEHICLE.bodyLength / 2 - 0.42, VEHICLE.bodyWidth / 2),
        localToScreen(-VEHICLE.bodyLength / 2, VEHICLE.bodyWidth / 2),
        localToScreen(-VEHICLE.bodyLength / 2, -VEHICLE.bodyWidth / 2),
        localToScreen(VEHICLE.bodyLength / 2 - 0.42, -VEHICLE.bodyWidth / 2),
      ];
      const cabinPts = [
        localToScreen(0.75, 0.48), localToScreen(-0.95, 0.48), localToScreen(-1.2, 0),
        localToScreen(-0.95, -0.48), localToScreen(0.75, -0.48), localToScreen(1.05, 0),
      ];

      function wheelRectPath(wheel) {
        const delta = deg2rad(angles[wheel.key]);
        const u = { x: Math.cos(delta), y: Math.sin(delta) };
        const n = { x: -Math.sin(delta), y: Math.cos(delta) };
        const halfLength = VEHICLE.wheelLength / 2;
        const halfWidth = VEHICLE.wheelWidth / 2;
        const pts = [
          { x: wheel.x + u.x * halfLength + n.x * halfWidth, y: wheel.y + u.y * halfLength + n.y * halfWidth },
          { x: wheel.x + u.x * halfLength - n.x * halfWidth, y: wheel.y + u.y * halfLength - n.y * halfWidth },
          { x: wheel.x - u.x * halfLength - n.x * halfWidth, y: wheel.y - u.y * halfLength - n.y * halfWidth },
          { x: wheel.x - u.x * halfLength + n.x * halfWidth, y: wheel.y - u.y * halfLength + n.y * halfWidth },
        ].map((p) => localToScreen(p.x, p.y));
        return polyPath(pts);
      }

      function torqueArrow(wheel) {
        const torque = torques[wheel.key];
        if (Math.abs(torque) < 0.04) return "";
        const delta = deg2rad(angles[wheel.key]);
        const sign = torque >= 0 ? 1 : -1;
        const len = (0.38 + Math.abs(torque) * 1.2) * stageTheme.arrowScale;
        const a = localToScreen(wheel.x, wheel.y);
        const b = localToScreen(wheel.x + sign * len * Math.cos(delta), wheel.y + sign * len * Math.sin(delta));
        const sw = (1.8 + Math.abs(torque) * 1.45) * visualScale * stageTheme.lineWidthScale;
        return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${stageTheme.color}" stroke-width="${sw}" stroke-linecap="round" marker-end="${stageTheme.markerId}" />`;
      }

      scene.innerHTML = `
        <defs>
          <radialGradient id="mapGlow" cx="50%" cy="50%" r="80%"><stop offset="0%" stop-color="#173042"/><stop offset="70%" stop-color="#0a1725"/><stop offset="100%" stop-color="#050b13"/></radialGradient>
          <linearGradient id="fsdRibbon" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="${WIDTH}" y2="0"><stop offset="0%" stop-color="#22d3ee" stop-opacity="0.10"/><stop offset="42%" stop-color="#67e8f9" stop-opacity="0.50"/><stop offset="62%" stop-color="#0ea5e9" stop-opacity="0.68"/><stop offset="100%" stop-color="#38bdf8" stop-opacity="0.10"/></linearGradient>
          <filter id="softGlow" filterUnits="userSpaceOnUse" x="-320" y="-320" width="${WIDTH + 640}" height="${HEIGHT + 640}"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <marker id="arrowStage1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/></marker>
          <marker id="arrowStage2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/></marker>
          <marker id="arrowStage3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#c084fc"/></marker>
        </defs>
        <rect x="0" y="0" width="${WIDTH}" height="${HEIGHT}" fill="url(#mapGlow)" />
        ${grid.map((g) => `<line x1="${g.a.x}" y1="${g.a.y}" x2="${g.b.x}" y2="${g.b.y}" stroke="${g.major ? "rgba(148,163,184,0.25)" : "rgba(148,163,184,0.10)"}" stroke-width="${g.major ? 1.25 : 0.6}" />`).join("")}
        <line x1="${worldToScreen(-200,0).x}" y1="${worldToScreen(-200,0).y}" x2="${worldToScreen(200,0).x}" y2="${worldToScreen(200,0).y}" stroke="rgba(56,189,248,0.35)" stroke-width="2" />
        <line x1="${worldToScreen(0,-200).x}" y1="${worldToScreen(0,-200).y}" x2="${worldToScreen(0,200).x}" y2="${worldToScreen(0,200).y}" stroke="rgba(244,114,182,0.32)" stroke-width="2" />
        ${trailD ? `<path d="${trailD}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="1 9" />` : ""}
        ${predD ? `<g filter="url(#softGlow)"><path d="${predD}" fill="none" stroke="rgba(34,211,238,0.28)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/><path d="${predD}" fill="none" stroke="url(#fsdRibbon)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/><path d="${predD}" fill="none" stroke="rgba(255,255,255,0.96)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="11 13" stroke-dashoffset="${centerDashOffset}" vector-effect="non-scaling-stroke"/></g>` : ""}
        <g transform="translate(${predLabelX}, ${predLabelY})"><rect x="0" y="0" width="126" height="28" rx="14" fill="rgba(2,6,23,0.78)" stroke="rgba(103,232,249,0.65)"/><text x="63" y="18" text-anchor="middle" fill="#e0fbff" font-size="12" font-weight="700">预测路径（2.5s）</text></g>
        <path d="${polyPath(bodyPts)}" fill="rgba(226,232,240,0.92)" stroke="rgba(255,255,255,0.78)" stroke-width="2" />
        <path d="${polyPath(cabinPts)}" fill="rgba(15,23,42,0.38)" stroke="rgba(148,163,184,0.48)" stroke-width="1.2" />
        <line x1="${localToScreen(VEHICLE.bodyLength / 2 - 0.42, 0).x}" y1="${localToScreen(VEHICLE.bodyLength / 2 - 0.42, 0).y}" x2="${localToScreen(VEHICLE.bodyLength / 2 - 0.02, 0).x}" y2="${localToScreen(VEHICLE.bodyLength / 2 - 0.02, 0).y}" stroke="rgba(34,211,238,0.64)" stroke-width="2" stroke-linecap="round" />
        ${WHEELS.map((w) => `<path d="${wheelRectPath(w)}" fill="#111827" stroke="#e2e8f0" stroke-width="1.1" />`).join("")}
        ${WHEELS.map((w) => torqueArrow(w)).join("")}
        ${WHEELS.map((w) => { const p = localToScreen(w.x, w.y + (w.y > 0 ? 0.55 : -0.55)); return `<text x="${p.x}" y="${p.y}" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">${w.short}</text>`; }).join("")}
      `;

      assistGrid.innerHTML = `
        <div><span>协助</span> ${coordinated.steerAssist.toFixed(1)}°</div><div><span>偏置</span> ${round1(torques.fr + torques.rr - torques.fl - torques.rl).toFixed(1)}</div>
        <div><span>FL</span> ${angles.fl.toFixed(1)}°/${torques.fl.toFixed(1)}</div><div><span>FR</span> ${angles.fr.toFixed(1)}°/${torques.fr.toFixed(1)}</div>
        <div><span>RL</span> ${angles.rl.toFixed(1)}°/${torques.rl.toFixed(1)}</div><div><span>RR</span> ${angles.rr.toFixed(1)}°/${torques.rr.toFixed(1)}</div>
      `;
      dynamicInfo.innerHTML = `
        <div class="line"><span>车速</span> ${(renderState.v * 3.6).toFixed(1)} km/h</div>
        <div class="line"><span>横摆</span> ${rad2deg(renderState.r).toFixed(1)} deg/s</div>
        <div class="line"><span>力矩</span> ${yawMoment.toFixed(0)} N·m</div>
        <div class="line"><span>等效角</span> ${equivalentSteer.toFixed(1)}°</div>
      `;
      modeCard.style.background = stageTheme.softBg;
      modeCard.style.border = `1px solid ${stageTheme.border}`;
      modeCard.style.boxShadow = `0 0 32px ${stageTheme.softBg}`;
      modeText.style.color = stageTheme.text;
      modeText.textContent = `Stage ${coordinated.stage} · ${stageTheme.title}`;
    }

    function updatePanel(coordinated, range) {
      const maxAbs = Math.max(Math.abs(range.min), Math.abs(range.max), 0.1);
      const percent = Math.round(coordinated.ratio * 100);
      speedValue.textContent = `${app.speedKmh.toFixed(1)} km/h`;
      steerValue.textContent = `${app.globalSteer.toFixed(1)}°`;
      steerSlider.min = String(-range.max);
      steerSlider.max = String(-range.min);
      steerSlider.value = String(-app.globalSteer);
      steerLeft.textContent = Math.abs(range.max).toFixed(1);
      steerRight.textContent = (-Math.abs(range.min)).toFixed(1);
      steerSub.textContent = `当前输入幅值 ${percent}%`;
      const p = clamp(app.globalSteer / maxAbs, -1, 1);
      const activeIndex = p > 2 / 3 ? 0 : p > 1 / 3 ? 1 : p < -2 / 3 ? 4 : p < -1 / 3 ? 3 : 2;
      segmentItems.forEach((el, index) => {
        el.classList.toggle("active", index === activeIndex);
      });
    }

    reset();
    requestAnimationFrame(render);
  </script>
</body>
</html>
