<html lang="zh-CN">
<head>

  <style>

      flex-direction: column;
      overflow: hidden;

      flex: 0 0 auto;
      margin: 0 0 6px;

<body>
  <main class="page">
    <section class="phone">
      <h1 class="title">灵驭智驱—四轮独立驱动/转向控制效果演示</h1>
      <div class="demo">
        <div class="scene">
          <canvas id="cv"></canvas>
          <div class="hud-left"><div id="leftHud" class="hud-grid"></div></div>
          <div class="hud-right"><div class="hud-title">动态信息</div><div id="rightHud"></div></div>

        </div>
        <div class="panel">
          <div class="panel-header">
            <div><div class="panel-title">协同转向主控制</div><div class="panel-sub">四轮独立转向与转矩分配已集成</div></div>
            <div class="tools"><input id="scaleInput" class="scale" type="range" min="0.6" max="2.2" step="0.1" value="1.6" /><button id="resetBtn" class="reset" type="button">重置</button></div>
          </div>
          <div class="controls">
            <div class="card">
              <div class="card-top"><div class="label">行驶车速</div><div id="speedVal" class="pill">3.3 km/h</div></div>
              <input id="speedInput" type="range" min="0" max="60" step="0.1" value="3.3" />
              <div class="bottom"><span>0.0</span><span class="sub">速度越高，可用转角范围自动收缩</span><span>60.0</span></div>
            </div>
            <div class="card">
              <div class="card-top"><div class="label">协同转向输入</div><div class="value-row"><button id="caseBtn" class="case" type="button">变道案例</button><div id="steerVal" class="pill">0.0°</div></div></div>
              <div class="segments"><div class="stage-row"><div>Stage 3</div><div>Stage 2</div><div>Stage 1</div><div>Stage 2</div><div>Stage 3</div></div><div class="seg-row"><div class="seg">左转矩/转向协同</div><div class="seg">左转向协同</div><div class="seg mid">纯阿克曼</div><div class="seg">右转向协同</div><div class="seg">右转矩/转向协同</div></div></div>
              <input id="steerInput" type="range" min="-28" max="28" step="0.1" value="0" />
              <div class="bottom"><span id="steerL">28.0</span><span id="steerSub" class="sub">当前输入幅值 0%</span><span id="steerR">-28.0</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const car = { L: 2.8, T: 1.56, bodyL: 4.65, bodyW: 1.92, wheelL: 0.72, wheelW: 0.28, mass: 1550, maxSteer: 32, maxGlobal: 28 };
      const wheels = [["fl", "FL", car.L / 2, car.T / 2], ["fr", "FR", car.L / 2, -car.T / 2], ["rl", "RL", -car.L / 2, car.T / 2], ["rr", "RR", -car.L / 2, -car.T / 2]];
      const initSpeed = 3.3, initPsi = Math.PI / 2, initScale = 1.6, baseTorque = 0.6;

      const cv = document.getElementById("cv");
      const ctx = cv.getContext("2d");
      const speedInput = document.getElementById("speedInput");
      const steerInput = document.getElementById("steerInput");
      const scaleInput = document.getElementById("scaleInput");
      const speedVal = document.getElementById("speedVal");
      const steerVal = document.getElementById("steerVal");
      const steerL = document.getElementById("steerL");
      const steerR = document.getElementById("steerR");
      const steerSub = document.getElementById("steerSub");
      const leftHud = document.getElementById("leftHud");
      const rightHud = document.getElementById("rightHud");
      const modeCard = document.getElementById("modeCard");
      const modeText = document.getElementById("modeText");
      const caseBtn = document.getElementById("caseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const segs = Array.from(document.querySelectorAll(".seg"));

      const app = { speed: initSpeed, steer: 0, scale: initScale, caseOn: false, caseStart: 0, last: 0, tick: 0, raf: 0, trail: [{ x: 0, y: 0 }], state: { x: 0, y: 0, psi: initPsi, v: initSpeed / 3.6, r: 0 } };

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rad = (d) => d * Math.PI / 180;
      const deg = (r) => r * 180 / Math.PI;
      const r1 = (v) => Math.round(v * 10) / 10;
      const smooth01 = (x) => { x = clamp(x, 0, 1); return x * x * (3 - 2 * x); };
      const mix = (a, b, t) => a + (b - a) * smooth01(t);
      const s5 = (u) => { u = clamp(u, 0, 1); return u * u * u * (10 - 15 * u + 6 * u * u); };
      const ds5 = (u) => { u = clamp(u, 0, 1); return 30 * u * u * (1 - u) * (1 - u); };
      const dds5 = (u) => { u = clamp(u, 0, 1); return 60 * u * (1 - u) * (1 - 2 * u); };

      function speedCase(t) {
        t = clamp(t, 0, 10);
        if (t < 1.6) return mix(3.3, 4.1, t / 1.6);
        if (t < 3.4) return mix(4.1, 5.3, (t - 1.6) / 1.8);
        if (t < 5.2) return mix(5.3, 5.9, (t - 3.4) / 1.8);
        if (t < 7.0) return mix(5.9, 5.0, (t - 5.2) / 1.8);
        if (t < 8.6) return mix(5.0, 4.2, (t - 7.0) / 1.6);
        return mix(4.2, 3.6, (t - 8.6) / 1.4);
      }
      function vyCase(t) { return speedCase(t) / 3.6; }
      function ayCase(t) { const e = 0.025; return (vyCase(t + e) - vyCase(t - e)) / (2 * e); }
      function latCase(t) {
        t = clamp(t, 0, 10);
        const finalShift = 4.7, overshootGain = 0.9, T = 10, u = t / T;
        const p = s5(u), dp = ds5(u), ddp = dds5(u);
        const beta = 64 * Math.pow(u, 3) * Math.pow(1 - u, 3);
        const dbeta = 192 * Math.pow(u, 2) - 768 * Math.pow(u, 3) + 960 * Math.pow(u, 4) - 384 * Math.pow(u, 5);
        const ddbeta = 384 * u - 2304 * Math.pow(u, 2) + 3840 * Math.pow(u, 3) - 1920 * Math.pow(u, 4);
        return { x: finalShift * p + overshootGain * beta, dx: (finalShift * dp + overshootGain * dbeta) / T, ddx: (finalShift * ddp + overshootGain * ddbeta) / (T * T) };
      }
      function yCase(t) { t = clamp(t, 0, 10); let y = 0; const dt = 0.02; for (let a = 0; a < t; a += dt) { const b = Math.min(a + dt, t); y += vyCase((a + b) / 2) * (b - a); } return y; }
      function stateCase(t) { t = clamp(t, 0, 10); const lateral = latCase(t), vx = lateral.dx, vy = vyCase(t), ax = lateral.ddx, ay = ayCase(t); const v = Math.hypot(vx, vy), psi = Math.atan2(vy, vx), denom = Math.max(vx * vx + vy * vy, 1e-6), r = (vx * ay - vy * ax) / denom; return { x: lateral.x, y: yCase(t), psi, v, r }; }
      function cmdCase(t) {
        t = clamp(t, 0, 10);
        const st = stateCase(t), lateral = latCase(t), vx = lateral.dx, vy = vyCase(t), ax = lateral.ddx, ay = ayCase(t);
        const denom = Math.max(vx * vx + vy * vy, 1e-6), r = (vx * ay - vy * ax) / denom;
        const delta = deg(Math.atan(car.L * r / Math.max(st.v, 0.1)));
        let ratio = clamp(delta / 30, -0.95, 0.95);
        if (t > 9.2) ratio *= 1 - s5((t - 9.2) / 0.8);
        if (t >= 10) ratio = 0;
        return { speed: r1(speedCase(t)), ratio };
      }

      function angleDiff(a, b) { let d = a - b; while (d > 180) d -= 360; while (d < -180) d += 360; return d; }
      function ackK(k) { const out = {}; for (const w of wheels) out[w[0]] = r1(deg(Math.atan2(k * w[2], 1 - k * w[3]))); return out; }
      function ack(g) { return ackK(Math.tan(rad(g)) / car.L); }
      function kappa(a) { const df = rad((a.fl + a.fr) / 2), dr = rad((a.rl + a.rr) / 2); return (Math.tan(df) - Math.tan(dr)) / car.L; }
      function globalFromAngles(a) { return r1(clamp(deg(Math.atan(kappa(a) * car.L)), -car.maxGlobal, car.maxGlobal)); }
      function safe(a, speed) { const v = speed / 3.6, k = kappa(a), ideal = ackK(k); const slip = Math.max(...wheels.map(w => Math.abs(angleDiff(a[w[0]], ideal[w[0]])))); const axle = Math.max(Math.abs(a.fl - a.fr), Math.abs(a.rl - a.rr)); const maxA = Math.max(...wheels.map(w => Math.abs(a[w[0]]))); return maxA <= car.maxSteer && v * v * Math.abs(k) <= 0.72 * 9.81 && slip <= Math.max(3.2, 8.5 - 0.045 * speed) && axle <= Math.max(7, 14 - speed / 22); }
      function steerRange(speed) { const vals = []; for (let d = -car.maxGlobal; d <= car.maxGlobal + 0.0001; d += 0.1) { const v = r1(d); if (safe(ack(v), speed)) vals.push(v); } return vals.length ? { min: vals[0], max: vals[vals.length - 1] } : { min: 0, max: 0 }; }
      function enforceSafe(a, speed) { if (safe(a, speed)) return a; let lo = 0, hi = 1; for (let i = 0; i < 28; i++) { const m = (lo + hi) / 2, c = { fl: a.fl * m, fr: a.fr * m, rl: a.rl * m, rr: a.rr * m }; if (safe(c, speed)) lo = m; else hi = m; } return { fl: r1(a.fl * lo), fr: r1(a.fr * lo), rl: r1(a.rl * lo), rr: r1(a.rr * lo) }; }
      function yawMoment(t, a) { let mz = 0; for (const w of wheels) { const f = 1700 * t[w[0]], ang = rad(a[w[0]]), fx = f * Math.cos(ang), fy = f * Math.sin(ang); mz += w[2] * fy - w[3] * fx; } return mz; }
      function getTheme(stage) { if (stage === 1) return { color: "#34d399", softBg: "rgba(52,211,153,.16)", border: "rgba(52,211,153,.55)", text: "#d1fae5", title: "纯阿克曼转向", arrowScale: 0.78, lineWidthScale: 0.95 }; if (stage === 2) return { color: "#38bdf8", softBg: "rgba(56,189,248,.16)", border: "rgba(56,189,248,.55)", text: "#e0f2fe", title: "阿克曼 + 独立转向协助", arrowScale: 1.0, lineWidthScale: 1.0 }; return { color: "#c084fc", softBg: "rgba(192,132,252,.18)", border: "rgba(192,132,252,.58)", text: "#f5e8ff", title: "阿克曼 + 独立转向 + 独立转矩分配", arrowScale: 1.22, lineWidthScale: 1.12 }; }
      function synthesize(g, speed, maxAbs) { const sign = g === 0 ? 0 : Math.sign(g); const ratio = clamp(Math.abs(g) / Math.max(0.1, maxAbs), 0, 1); const base = ack(g); const stage = ratio > 2 / 3 ? 3 : ratio > 1 / 3 ? 2 : 1; let assist = 0, bias = 0, angles = { ...base }, torques = { fl: baseTorque, fr: baseTorque, rl: baseTorque, rr: baseTorque }; if (stage >= 2) { const r = stage === 2 ? (ratio - 1 / 3) / (1 / 3) : 1; assist = 4.5 * r; angles = { fl: r1(base.fl + sign * assist), fr: r1(base.fr + sign * 0.85 * assist), rl: r1(base.rl - sign * 0.6 * assist), rr: r1(base.rr - sign * 0.45 * assist) }; } if (stage === 3) { const r = (ratio - 2 / 3) / (1 / 3); bias = 0.95 * r * sign; torques = { fl: r1(clamp(baseTorque - 0.55 * bias, -1, 1)), fr: r1(clamp(baseTorque + 0.55 * bias, -1, 1)), rl: r1(clamp(baseTorque - 0.45 * bias, -1, 1)), rr: r1(clamp(baseTorque + 0.45 * bias, -1, 1)) }; } angles = enforceSafe(angles, speed); return { stage, ratio, angles, torques, assist: r1(assist), bias: r1(bias) }; }
      function stepVehicle(st, ctrl, dt) { const target = ctrl.speed / 3.6, avg = (ctrl.torques.fl + ctrl.torques.fr + ctrl.torques.rl + ctrl.torques.rr) / 4, vt = clamp(target + 0.85 * avg, 0, 38), v = clamp(st.v + (vt - st.v) * Math.min(1, dt * 1.6), 0, 40), kk = kappa(ctrl.angles), mz = yawMoment(ctrl.torques, ctrl.angles), rt = clamp(v * kk + 0.82 * mz / (car.mass * Math.max(v, 2.2) * car.L), -1.15, 1.15), r = st.r + (rt - st.r) * Math.min(1, dt * 3.1); return { x: st.x + v * Math.cos(st.psi) * dt, y: st.y + v * Math.sin(st.psi) * dt, psi: st.psi + r * dt, v, r }; }
      function resize() { const dpr = window.devicePixelRatio || 1, w = cv.clientWidth, h = cv.clientHeight; cv.width = Math.max(1, Math.floor(w * dpr)); cv.height = Math.max(1, Math.floor(h * dpr)); ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }
      function reset() { app.speed = initSpeed; app.steer = 0; app.scale = initScale; app.caseOn = false; app.caseStart = 0; app.state = { x: 0, y: 0, psi: initPsi, v: initSpeed / 3.6, r: 0 }; app.trail = [{ x: 0, y: 0 }]; speedInput.value = String(initSpeed); steerInput.value = "0"; scaleInput.value = String(initScale); caseBtn.classList.remove("active"); }
      function startCase() { reset(); app.caseOn = true; app.caseStart = performance.now(); caseBtn.classList.add("active"); }
      function strokePath(pts, color, lw, dash, dashOffset = 0) { if (pts.length < 2) return; ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.setLineDash(dash || []); ctx.lineDashOffset = dashOffset; ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke(); ctx.restore(); }
      function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

      function draw(coord, ctrl) {
        const W = cv.clientWidth, H = cv.clientHeight;
        ctx.clearRect(0, 0, W, H);
        const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.72);
        bg.addColorStop(0, "#173042"); bg.addColorStop(0.7, "#0a1725"); bg.addColorStop(1, "#050b13"); ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
        const sc = 40 * app.scale * W / 760, ax = W * 0.5, ay = H * 0.56, cam = { x: app.state.x, y: app.state.y };

        const gl = ctx.createLinearGradient(0, 0, W, 0); gl.addColorStop(0, "rgba(34,211,238,.12)"); gl.addColorStop(0.5, "rgba(103,232,249,.62)"); gl.addColorStop(1, "rgba(56,189,248,.12)"); strokePath(pred, gl, 20); strokePath(pred, "rgba(255,255,255,.96)", 3.2, [11, 13], fsdDashOffset);

        poly([l2s(0.75, 0.48), l2s(-0.95, 0.48), l2s(-1.2, 0), l2s(-0.95, -0.48), l2s(0.75, -0.48), l2s(1.05, 0)], "rgba(15,23,42,.38)", "rgba(148,163,184,.48)", 1.2);
        function wheelPts(w, aDeg) { const d = rad(aDeg), u = { x: Math.cos(d), y: Math.sin(d) }, n = { x: -Math.sin(d), y: Math.cos(d) }, hl = car.wheelL / 2, hw = car.wheelW / 2; return [{ x: w[2] + u.x * hl + n.x * hw, y: w[3] + u.y * hl + n.y * hw }, { x: w[2] + u.x * hl - n.x * hw, y: w[3] + u.y * hl - n.y * hw }, { x: w[2] - u.x * hl - n.x * hw, y: w[3] - u.y * hl - n.y * hw }, { x: w[2] - u.x * hl + n.x * hw, y: w[3] - u.y * hl + n.y * hw }].map(p => l2s(p.x, p.y)); }

        const mz = yawMoment(coord.torques, coord.angles), eq = globalFromAngles(coord.angles), bias = r1(coord.torques.fr + coord.torques.rr - coord.torques.fl - coord.torques.rl);

      }

      function updatePanel(coord, rg) { speedVal.textContent = `${app.speed.toFixed(1)} km/h`; steerVal.textContent = `${app.steer.toFixed(1)}°`; steerInput.min = String(-rg.max); steerInput.max = String(-rg.min); steerInput.value = String(-app.steer); steerL.textContent = Math.abs(rg.max).toFixed(1); steerR.textContent = (-Math.abs(rg.min)).toFixed(1); steerSub.textContent = `当前输入幅值 ${Math.round(coord.ratio * 100)}%`; const maxAbs = Math.max(Math.abs(rg.min), Math.abs(rg.max), 0.1), p = clamp(app.steer / maxAbs, -1, 1), idx = p > 2 / 3 ? 0 : p > 1 / 3 ? 1 : p < -2 / 3 ? 4 : p < -1 / 3 ? 3 : 2; segs.forEach((el, i) => el.classList.toggle("active", i === idx)); }
      function runSelfTests() { const s0 = stateCase(0); console.assert(Math.abs(s0.x) < 1e-9, "stateCase(0).x should start at 0"); console.assert(Math.abs(s0.y) < 1e-9, "stateCase(0).y should start at 0"); console.assert(Number.isFinite(s0.psi), "stateCase(0).psi should be finite"); const s10 = stateCase(10); console.assert(Math.abs(s10.x - 4.7) < 1e-6, "stateCase(10).x should finish at target lane"); console.assert(Number.isFinite(s10.psi), "stateCase(10).psi should be finite"); const c1 = cmdCase(1); console.assert(Math.abs(c1.ratio) <= 0.28, "cmdCase should start gently"); const c4 = cmdCase(4); console.assert(Math.abs(c4.ratio) <= 0.60, "cmdCase should transition through Stage 2 before Stage 3"); const c10 = cmdCase(10); console.assert(c10.ratio === 0, "cmdCase(10) should end at exactly zero steering"); const endLat = latCase(10); console.assert(Math.abs(endLat.dx) < 1e-9, "latCase(10).dx should be zero"); console.assert(Math.abs(endLat.ddx) < 1e-9, "latCase(10).ddx should be zero"); console.assert(Math.abs(stateCase(10).psi - initPsi) < 0.03, "case should finish with the vehicle heading nearly upward"); const rg = steerRange(3.3); console.assert(rg.max >= rg.min, "steer range should be valid"); }
